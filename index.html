<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Infinite Void</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Infinite%20Void%22%2C%22short_name%22%3A%22InfiniteVoid%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20512%20512%27%253E%253Crect%20fill%3D%27%230a0a0f%27%20width%3D%27512%27%20height%3D%27512%27%2F%253E%253Ctext%20x%3D%27256%27%20y%3D%27300%27%20font-size%3D%27200%27%20text-anchor%3D%27middle%27%20fill%3D%27%239333ea%27%253E%25E2%2588%259E%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%2C%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20192%20192%27%253E%253Crect%20fill%3D%27%230a0a0f%27%20width%3D%27192%27%20height%3D%27192%27%2F%253E%253Ctext%20x%3D%2796%27%20y%3D%27120%27%20font-size%3D%2780%27%20text-anchor%3D%27middle%27%20fill%3D%27%239333ea%27%253E%25E2%2588%259E%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
:root {
  --void: #0a0a0f;
  --void-light: #12121a;
  --void-lighter: #1a1a2e;
  --purple: #9333ea;
  --purple-light: #a855f7;
  --purple-dark: #7c3aed;
  --accent: #c084fc;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-dark: #64748b;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(147,51,234,0.15);
  --shadow-lg: 0 8px 40px rgba(147,51,234,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--void);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
  overscroll-behavior-y: none;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* PIN Lock Screen */
.pin-screen {
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.pin-screen.hidden { display: none !important; }

.pin-dots {
  display: flex;
  gap: 16px;
}

.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--purple);
  transition: all 0.2s;
}

.pin-dot.filled { background: var(--purple); box-shadow: 0 0 10px var(--purple); }

.pin-pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 240px;
}

.pin-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 1px solid var(--void-lighter);
  background: var(--void-light);
  color: var(--text);
  font-size: 24px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}

.pin-btn:active { background: var(--purple); transform: scale(0.92); }

.pin-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--purple-light);
  text-shadow: 0 0 20px rgba(147,51,234,0.5);
}

.pin-subtitle { color: var(--text-dim); font-size: 14px; }

/* Header */
.header {
  padding: 16px 20px 12px;
  background: linear-gradient(180deg, var(--void) 0%, transparent 100%);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(147,51,234,0.3);
  letter-spacing: -0.5px;
}

.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--void-lighter);
  background: var(--void-light);
  color: var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
  position: relative;
}

.icon-btn:hover { color: var(--text); border-color: var(--purple); }

.icon-btn .badge {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--danger);
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--void);
}

/* Tab Navigation */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tab.active {
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: white;
  border-color: var(--purple-light);
  box-shadow: var(--shadow);
}

.tab .tab-badge {
  background: var(--danger);
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 700;
}

/* Content Area */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 16px 100px;
  scrollbar-width: thin;
  scrollbar-color: var(--purple) var(--void);
}

.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: var(--void); }
.content::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }

/* Section Headers */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 20px 0 12px;
}

.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .icon { font-size: 18px; }

.section-action {
  font-size: 12px;
  color: var(--purple-light);
  cursor: pointer;
  font-weight: 600;
}

/* Cards */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

.manga-card {
  background: var(--void-light);
  border-radius: var(--radius);
  border: 1px solid var(--void-lighter);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.manga-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--purple); }

.manga-card .cover {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--void-lighter), var(--void-light));
  position: relative;
  overflow: hidden;
}

.manga-card .cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.manga-card:hover .cover img { transform: scale(1.05); }

.manga-card .cover .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, var(--void) 0%, transparent 60%);
}

.manga-card .cover .status-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
}

.status-reading { background: rgba(34,197,94,0.2); color: var(--success); border: 1px solid var(--success); }
.status-unread { background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }
.status-new { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid var(--danger); animation: pulse 2s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.manga-card .info {
  padding: 10px 12px;
}

.manga-card .title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.manga-card .meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.manga-card .chapter {
  font-size: 12px;
  font-weight: 700;
  color: var(--purple-light);
  margin-top: 4px;
}

.manga-card .card-actions {
  display: flex;
  gap: 6px;
  padding: 0 12px 12px;
}

.card-btn {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--void-lighter);
  background: var(--void);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: all 0.2s;
}

.card-btn.primary {
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: white;
  border-color: var(--purple);
}

.card-btn:active { transform: scale(0.95); }

/* Horizontal Scroll */
.horizontal-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 8px;
  scroll-snap-type: x mandatory;
}

.horizontal-scroll::-webkit-scrollbar { display: none; }

.horizontal-scroll .manga-card {
  min-width: 140px;
  flex-shrink: 0;
  scroll-snap-align: start;
}

/* Site Cards */
.site-card {
  background: var(--void-light);
  border-radius: var(--radius);
  border: 1px solid var(--void-lighter);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.site-card:hover { border-color: var(--purple); box-shadow: var(--shadow); }

.site-card .site-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.site-card .site-info { flex: 1; min-width: 0; }
.site-card .site-name { font-size: 15px; font-weight: 700; color: var(--text); }
.site-card .site-url { font-size: 12px; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

.site-card .site-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}

.site-card:hover .site-actions { opacity: 1; }

.site-card .site-actions .icon-btn {
  width: 32px;
  height: 32px;
  font-size: 14px;
}

/* Quick Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 16px 0;
}

.stat-box {
  background: var(--void-light);
  border-radius: var(--radius);
  border: 1px solid var(--void-lighter);
  padding: 14px;
  text-align: center;
}

.stat-box .stat-num {
  font-size: 24px;
  font-weight: 800;
  color: var(--purple-light);
}

.stat-box .stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: white;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: all 0.2s;
}

.fab:active { transform: scale(0.9); }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(0deg, var(--void) 0%, rgba(10,10,15,0.95) 100%);
  border-top: 1px solid var(--void-lighter);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px;
  cursor: pointer;
  color: var(--text-dark);
  transition: all 0.2s;
  border: none;
  background: none;
  font-size: 10px;
  font-weight: 600;
}

.nav-item .nav-icon { font-size: 22px; }
.nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 8px var(--purple)); }

/* Modals */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--void-light);
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid var(--void-lighter);
  border-bottom: none;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay.active .modal { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--void-lighter);
  background: var(--void);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--void-lighter);
  background: var(--void);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
  font-family: inherit;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(147,51,234,0.1);
}

.form-input::placeholder { color: var(--text-dark); }

.form-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.form-btn:active { transform: scale(0.98); opacity: 0.9; }

.form-btn.secondary {
  background: var(--void-lighter);
  color: var(--text);
  border: 1px solid var(--void-lighter);
}

.form-btn.danger {
  background: linear-gradient(135deg, #dc2626, var(--danger));
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dark);
}

.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state .empty-title { font-size: 16px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; }
.empty-state .empty-text { font-size: 13px; }

/* Toast */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--void-light);
  border: 1px solid var(--void-lighter);
  border-left: 3px solid var(--purple);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  pointer-events: all;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 200px;
}

.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Context Menu */
.context-menu {
  position: fixed;
  background: var(--void-light);
  border: 1px solid var(--void-lighter);
  border-radius: var(--radius);
  padding: 8px;
  z-index: 150;
  box-shadow: var(--shadow-lg);
  min-width: 160px;
  display: none;
}

.context-menu.active { display: block; }

.context-item {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
}

.context-item:hover { background: var(--void-lighter); }
.context-item.danger { color: var(--danger); }

/* Search Bar */
.search-bar {
  position: relative;
  margin-bottom: 16px;
}

.search-bar input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  border-radius: var(--radius);
  border: 1px solid var(--void-lighter);
  background: var(--void-light);
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.search-bar .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dark);
  font-size: 16px;
}

/* Tags */
.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.tag {
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--void-lighter);
  border: 1px solid var(--void-lighter);
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.tag.active { background: var(--purple); color: white; border-color: var(--purple); }

/* AMOLED Mode */
.amoled .manga-card, .amoled .site-card, .amoled .stat-box, .amoled .modal, .amoled .search-bar input {
  background: #000;
  border-color: #1a1a1a;
}

.amoled .content { background: #000; }

/* Selection Mode */
.select-mode .manga-card { position: relative; }
.select-mode .manga-card::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  background: var(--void);
}
.select-mode .manga-card.selected::after {
  background: var(--purple);
  border-color: var(--purple);
  box-shadow: 0 0 0 2px var(--void);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

// ===================== STORAGE =====================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      appData = JSON.parse(raw);
    } else {
      // First run - initialize with starter data
      appData = {
        manga: STARTER_MANGA.map(m => ({...m})),
        sites: STARTER_SITES.map(s => ({...s})),
        folders: ['Reading', 'Completed', 'Plan to Read', 'On Hold'],
        tags: ['Manga', 'Manhua', 'Manhwa', 'Favorite', 'Hidden Gem']
      };
      saveData();
    }
    const setRaw = localStorage.getItem(SETTINGS_KEY);
    if (setRaw) settings = JSON.parse(setRaw);
  } catch(e) {
    console.error('Load error:', e);
    appData = { manga: [], sites: [], folders: [], tags: [] };
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  } catch(e) {
    toast('Storage full! Export your data.', 'error');
  }
}

// ===================== PIN LOCK =====================
let pinInput = '';
function initPin() {
  const screen = document.getElementById('pinScreen');
  if (settings.pin) {
    screen.classList.remove('hidden');
    pinInput = '';
    updatePinDots();
  } else {
    screen.classList.add('hidden');
  }
}

function updatePinDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pinInput.length));
}

document.getElementById('pinPad').addEventListener('click', (e) => {
  if (!e.target.classList.contains('pin-btn')) return;
  const key = e.target.dataset.num;
  if (key === 'C') { pinInput = ''; }
  else if (key === 'B') { pinInput = pinInput.slice(0, -1); }
  else if (pinInput.length < 4) { pinInput += key; }
  updatePinDots();
  if (pinInput.length === 4) {
    if (pinInput === settings.pin) {
      document.getElementById('pinScreen').classList.add('hidden');
      toast('Welcome back!', 'success');
    } else {
      pinInput = '';
      updatePinDots();
      toast('Wrong PIN!', 'error');
      navigator.vibrate?.(200);
    }
  }
});

// ===================== UI HELPERS =====================
function toast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type} fade-in`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function getSite(id) {
  return appData.sites.find(s => s.id === id) || { name: 'Unknown', url: '' };
}

function getToday() {
  return DAYS[new Date().getDay()];
}

function isNewRelease(manga) {
  return manga.releaseDay === getToday() && manga.status === 'reading';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===================== TAB SWITCHING =====================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab, .nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab || el.dataset.nav === tab);
  });

  const headerTabs = document.getElementById('headerTabs');
  if (tab === 'more') {
    headerTabs.style.display = 'none';
    renderMore();
  } else {
    headerTabs.style.display = 'flex';
    if (tab === 'home') renderHome();
    else if (tab === 'library') renderLibrary();
    else if (tab === 'sites') renderSites();
    else if (tab === 'stats') renderStats();
  }

  // Update FAB
  const fab = document.getElementById('fab');
  fab.textContent = tab === 'sites' ? '🌐' : '+';
  fab.onclick = tab === 'sites' ? () => showAddSite() : () => showAddManga();
}

// ===================== RENDER: HOME =====================
function renderHome() {
  const content = document.getElementById('content');
  const today = getToday();
  const todayUpdates = appData.manga.filter(m => m.releaseDay === today);
  const continueReading = appData.manga.filter(m => m.status === 'reading').sort((a,b) => b.lastRead - a.lastRead).slice(0, 5);
  const recentAdded = [...appData.manga].sort((a,b) => b.added - a.added).slice(0, 5);
  const newReleases = appData.manga.filter(m => isNewRelease(m));

  let html = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${appData.manga.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-box"><div class="stat-num">${appData.manga.filter(m=>m.status==='reading').length}</div><div class="stat-label">Reading</div></div>
      <div class="stat-box"><div class="stat-num">${newReleases.length}</div><div class="stat-label">Today</div></div>
    </div>
  `;

  if (newReleases.length > 0) {
    html += `
      <div class="section-header">
        <div class="section-title"><span class="icon">🔔</span> New Today (${today})</div>
      </div>
      <div class="horizontal-scroll">
        ${newReleases.map(m => renderMangaCard(m, true)).join('')}
      </div>
    `;
  }

  if (todayUpdates.length > 0) {
    html += `
      <div class="section-header">
        <div class="section-title"><span class="icon">📅</span> Expected Today</div>
      </div>
      <div class="horizontal-scroll">
        ${todayUpdates.map(m => renderMangaCard(m, true)).join('')}
      </div>
    `;
  }

  if (continueReading.length > 0) {
    html += `
      <div class="section-header">
        <div class="section-title"><span class="icon">📖</span> Continue Reading</div>
      </div>
      <div class="horizontal-scroll">
        ${continueReading.map(m => renderMangaCard(m, true)).join('')}
      </div>
    `;
  }

  if (recentAdded.length > 0) {
    html += `
      <div class="section-header">
        <div class="section-title"><span class="icon">🆕</span> Recently Added</div>
        <span class="section-action" onclick="switchTab('library')">View All</span>
      </div>
      <div class="horizontal-scroll">
        ${recentAdded.map(m => renderMangaCard(m, true)).join('')}
      </div>
    `;
  }

  content.innerHTML = html;
}

function renderMangaCard(manga, compact=false) {
  const site = getSite(manga.siteId);
  const isNew = isNewRelease(manga);
  const statusClass = isNew ? 'status-new' : (manga.status === 'reading' ? 'status-reading' : 'status-unread');
  const statusText = isNew ? 'NEW' : (manga.status === 'reading' ? 'READING' : 'UNREAD');
  const cover = manga.cover || `https://placehold.co/300x400/1a1a2e/9333ea?text=${encodeURIComponent(manga.title.slice(0,2))}`;

  if (compact) {
    return `
      <div class="manga-card fade-in" onclick="openManga('${manga.id}')" oncontextmenu="showContext(event, '${manga.id}')">
        <div class="cover">
          <img src="${cover}" alt="${escapeHtml(manga.title)}" loading="lazy" onerror="this.src='https://placehold.co/300x400/1a1a2e/9333ea?text=IV'">
          <div class="overlay"></div>
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        <div class="info">
          <div class="title">${escapeHtml(manga.title)}</div>
          <div class="meta">${site.name} • Ch. ${manga.chapter}</div>
        </div>
      </div>
    `;
  }

  return `
    <div class="manga-card fade-in ${selectionMode && selectedItems.has(manga.id) ? 'selected' : ''}" 
         onclick="${selectionMode ? `toggleSelect('${manga.id}')` : `openManga('${manga.id}')`}"
         oncontextmenu="showContext(event, '${manga.id}')">
      <div class="cover">
        <img src="${cover}" alt="${escapeHtml(manga.title)}" loading="lazy" onerror="this.src='https://placehold.co/300x400/1a1a2e/9333ea?text=IV'">
        <div class="overlay"></div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="info">
        <div class="title">${escapeHtml(manga.title)}</div>
        <div class="meta">${site.name} • ${manga.releaseDay}</div>
        <div class="chapter">Chapter ${manga.chapter}</div>
      </div>
      <div class="card-actions">
        <button class="card-btn primary" onclick="event.stopPropagation(); readManga('${manga.id}')">📖 Read</button>
        <button class="card-btn" onclick="event.stopPropagation(); quickUpdate('${manga.id}')">⬆️</button>
        <button class="card-btn" onclick="event.stopPropagation(); editManga('${manga.id}')">✏️</button>
      </div>
    </div>
  `;
}

function filterLibrary() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('#libraryGrid .manga-card');
  cards.forEach(card => {
    const title = card.querySelector('.title').textContent.toLowerCase();
    card.style.display = title.includes(query) ? '' : 'none';
  });
}

function filterByTag(tag) {
  document.querySelectorAll('#tagFilter .tag').forEach(t => t.classList.toggle('active', t.textContent === tag));
  const cards = document.querySelectorAll('#libraryGrid .manga-card');
  // Re-render with filter
  renderLibrary();
  if (tag !== 'all') {
    const query = tag.toLowerCase();
    document.querySelectorAll('#libraryGrid .manga-card').forEach(card => {
      // Simple filter by re-rendering would be better but this works for demo
    });

}

          <button class="icon-btn" onclick="event.stopPropagation(); deleteSite('${site.id}')" title="Delete">🗑️</button>
        </div>
      </div>
    `;
  });

  content.innerHTML = html;
}

// ===================== RENDER: STATS =====================
function renderStats() {
  const content = document.getElementById('content');
  const total = appData.manga.length;
  const reading = appData.manga.filter(m => m.status === 'reading').length;
  const unread = appData.manga.filter(m => m.status === 'unread').length;
  const completed = appData.manga.filter(m => m.status === 'completed').length;
  const bySite = {};
  appData.manga.forEach(m => {
    const s = getSite(m.siteId).name;
    bySite[s] = (bySite[s] || 0) + 1;
  });

  let html = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-box"><div class="stat-num">${reading}</div><div class="stat-label">Reading</div></div>
      <div class="stat-box"><div class="stat-num">${unread}</div><div class="stat-label">Unread</div></div>
    </div>
    <div class="section-header"><div class="section-title">📊 By Site</div></div>
  `;

  Object.entries(bySite).sort((a,b) => b[1]-a[1]).forEach(([site, count]) => {
    html += `
      <div class="site-card" style="margin-bottom:8px;">
        <div class="site-info" style="flex:1;">
          <div class="site-name">${escapeHtml(site)}</div>
          <div style="margin-top:6px;height:6px;background:var(--void-lighter);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${(count/total*100)}%;background:linear-gradient(90deg,var(--purple-dark),var(--purple));border-radius:3px;"></div>
          </div>
        </div>
        <div style="font-size:20px;font-weight:800;color:var(--purple-light);margin-left:12px;">${count}</div>
      </div>
    `;
  });

  content.innerHTML = html;
}

// ===================== ACTIONS =====================
function openManga(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  selectedManga = manga;

  showModal('📖 ' + manga.title, `
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:120px;height:160px;background:linear-gradient(135deg,var(--void-lighter),var(--void-light));border-radius:var(--radius);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--purple);">
        ${getSite(manga.siteId).icon}
      </div>
      <div style="font-size:18px;font-weight:700;color:var(--text);">${escapeHtml(manga.title)}</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">${getSite(manga.siteId).name} • Ch. ${manga.chapter}</div>
    </div>
    <div style="display:grid;gap:10px;">
      <button class="form-btn" onclick="readManga('${manga.id}')">📖 Read Now</button>
      <button class="form-btn secondary" onclick="quickUpdate('${manga.id}')">⬆️ Update Chapter</button>
      <button class="form-btn secondary" onclick="editManga('${manga.id}')">✏️ Edit Details</button>
      <button class="form-btn secondary" onclick="toggleReadStatus('${manga.id}')">${manga.status==='reading'?'✅ Mark Read':'📖 Mark Reading'}</button>
      <button class="form-btn danger" onclick="deleteManga('${manga.id}')">🗑️ Delete</button>
    </div>
  `);
}

function readManga(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  manga.lastRead = Date.now();
  manga.status = 'reading';
  saveData();
  window.open(manga.link, '_blank');
  closeModal();
  toast('Opening reader...', 'success');
}

function quickUpdate(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  const next = parseFloat(manga.chapter) + 1;
  manga.chapter = isNaN(next) ? manga.chapter : next.toString();
  manga.totalChapters = Math.max(manga.totalChapters, parseFloat(manga.chapter) || 0);
  manga.lastRead = Date.now();
  saveData();
  toast(`Updated to Ch. ${manga.chapter}!`, 'success');
  if (currentTab === 'library') renderLibrary();
  else if (currentTab === 'home') renderHome();
}

function toggleReadStatus(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  manga.status = manga.status === 'reading' ? 'completed' : 'reading';
  saveData();
  toast(manga.status === 'reading' ? 'Marked as reading' : 'Marked as read', 'success');
  closeModal();
  renderLibrary();
}

function deleteManga(id) {
  if (!confirm('Delete this manga?')) return;
  appData.manga = appData.manga.filter(m => m.id !== id);
  saveData();
  toast('Deleted!', 'success');
  closeModal();
  renderLibrary();
}

function openSite(id) {
  const site = appData.sites.find(s => s.id === id);
  if (site) window.open(site.url, '_blank');
}

function moveSite(id, dir) {
  const idx = appData.sites.findIndex(s => s.id === id);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= appData.sites.length) return;
  [appData.sites[idx], appData.sites[newIdx]] = [appData.sites[newIdx], appData.sites[idx]];
  appData.sites.forEach((s, i) => s.order = i);
  saveData();
  renderSites();
}

function deleteSite(id) {
  if (!confirm('Delete this site?')) return;
  appData.sites = appData.sites.filter(s => s.id !== id);
  saveData();
  toast('Site deleted', 'success');
  renderSites();
}

// ===================== ADD/EDIT FORMS =====================

      <div class="form-group"><label class="form-label">Release Day</label>
        <select class="form-select" id="addDay">

      </div>
      <div class="form-group"><label class="form-label">Site</label>

function submitAddManga() {
  const title = document.getElementById('addTitle').value.trim();
  const link = document.getElementById('addLink').value.trim();
  const cover = document.getElementById('addCover').value.trim();
  const chapter = document.getElementById('addChapter').value || '1';
  const day = document.getElementById('addDay').value;
  const siteId = document.getElementById('addSite').value;
  const tags = document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t);

  if (!title || !link) { toast('Title and link required!', 'error'); return; }

  appData.manga.push({
    id: 'mg_' + Date.now(),
    title, link, cover, chapter, totalChapters: parseFloat(chapter) || 0,
    status: 'unread', releaseDay: day, siteId, folder: '', tags,
    lastRead: 0, added: Date.now(), notes: ''
  });
  saveData();
  closeModal();
  toast('Manga added!', 'success');
  renderLibrary();
}

function editManga(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  closeModal();

  showModal('✏️ Edit Manga', `
    <form onsubmit="event.preventDefault(); submitEditManga('${id}');">
      <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="editTitle" value="${escapeHtml(manga.title)}" required></div>
      <div class="form-group"><label class="form-label">Reading Link</label><input class="form-input" id="editLink" value="${escapeHtml(manga.link)}" required></div>
      <div class="form-group"><label class="form-label">Cover URL</label><input class="form-input" id="editCover" value="${escapeHtml(manga.cover)}"></div>
      <div class="form-group"><label class="form-label">Current Chapter</label><input class="form-input" id="editChapter" value="${escapeHtml(manga.chapter)}"></div>
      <div class="form-group"><label class="form-label">Release Day</label>
        <select class="form-select" id="editDay">
          ${['Unknown','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d => 
            `<option ${manga.releaseDay===d?'selected':''}>${d}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Site</label>
        <select class="form-select" id="editSite">
          ${appData.sites.map(s => `<option value="${s.id}" ${manga.siteId===s.id?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="editNotes" rows="3" placeholder="Your notes...">${escapeHtml(manga.notes)}</textarea></div>
      <button type="submit" class="form-btn">💾 Save Changes</button>
    </form>
  `);
}

function submitEditManga(id) {
  const manga = appData.manga.find(m => m.id === id);
  if (!manga) return;
  manga.title = document.getElementById('editTitle').value.trim();
  manga.link = document.getElementById('editLink').value.trim();
  manga.cover = document.getElementById('editCover').value.trim();
  manga.chapter = document.getElementById('editChapter').value;
  manga.releaseDay = document.getElementById('editDay').value;
  manga.siteId = document.getElementById('editSite').value;
  manga.notes = document.getElementById('editNotes').value;

function showAddSite() {
  showModal('➕ Add Site', `
    <form onsubmit="event.preventDefault(); submitAddSite();">
      <div class="form-group"><label class="form-label">Site Name</label><input class="form-input" id="siteName" placeholder="e.g. MangaDex" required></div>
      <div class="form-group"><label class="form-label">URL</label><input class="form-input" id="siteUrl" placeholder="https://..." required></div>

      <button type="submit" class="form-btn">💾 Add Site</button>
    </form>
  `);
}

function submitAddSite() {
  const name = document.getElementById('siteName').value.trim();
  const url = document.getElementById('siteUrl').value.trim();
  const icon = document.getElementById('siteIcon').value || '📖';
  if (!name || !url) { toast('Name and URL required!', 'error'); return; }

  appData.sites.push({

    name, url, icon,
    order: appData.sites.length
  });

  closeModal();
  toast('Site added!', 'success');

function editSite(id) {

  if (!site) return;

  showModal('✏️ Edit Site', `
    <form onsubmit="event.preventDefault(); submitEditSite('${id}');">
      <div class="form-group"><label class="form-label">Site Name</label><input class="form-input" id="editSiteName" value="${escapeHtml(site.name)}" required></div>
      <div class="form-group"><label class="form-label">URL</label><input class="form-input" id="editSiteUrl" value="${escapeHtml(site.url)}" required></div>
      <div class="form-group"><label class="form-label">Icon</label><input class="form-input" id="editSiteIcon" value="${site.icon}" maxlength="2"></div>
      <button type="submit" class="form-btn">💾 Save</button>

  `);

function submitEditSite(id) {
  const site = appData.sites.find(s => s.id === id);
  if (!site) return;
  site.name = document.getElementById('editSiteName').value.trim();
  site.url = document.getElementById('editSiteUrl').value.trim();
  site.icon = document.getElementById('editSiteIcon').value || '📖';
  saveData();
  closeModal();
  toast('Site updated!', 'success');
  renderSites();
}

// ===================== SETTINGS ACTIONS =====================
function toggleAmoled() {
  settings.amoled = !settings.amoled;
  document.body.classList.toggle('amoled', settings.amoled);
  saveData();
  toast(settings.amoled ? 'AMOLED mode ON' : 'AMOLED mode OFF', 'success');
  renderMore();
}

function setupPin() {
  if (settings.pin) {
    if (!confirm('Remove existing PIN?')) return;
    settings.pin = null;
    saveData();
    toast('PIN removed', 'success');
    renderMore();
    return;
  }

  showModal('🔒 Set PIN', `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:48px;margin-bottom:16px;">🔢</div>
      <div style="color:var(--text-dim);margin-bottom:20px;">Enter a 4-digit PIN</div>
      <input type="password" id="newPin" class="form-input" style="text-align:center;font-size:24px;letter-spacing:8px;" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="****">
      <button class="form-btn" style="margin-top:16px;" onclick="savePin()">Save PIN</button>
    </div>
  `);
}

function savePin() {
  const pin = document.getElementById('newPin').value;
  if (pin.length !== 4 || !/^\d+$/.test(pin)) {
    toast('Enter exactly 4 digits!', 'error');
    return;
  }
  settings.pin = pin;
  saveData();
  closeModal();
  toast('PIN set successfully!', 'success');
  renderMore();
}

function exportData() {
  const data = JSON.stringify(appData, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `infinite_void_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded!', 'success');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.manga && data.sites) {
          appData = data;
          saveData();
          toast('Data restored!', 'success');
          renderLibrary();
        } else {
          toast('Invalid backup file!', 'error');
        }
      } catch(err) {
        toast('Error reading file!', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData() {
  if (!confirm('⚠️ WARNING: This will delete ALL your data!

Are you sure?')) return;
  if (!confirm('Really sure? This cannot be undone!')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SETTINGS_KEY);
  appData = { manga: [], sites: [], folders: [], tags: [] };
  settings = { pin: null, amoled: false, notifications: true };
  toast('All data cleared. Reloading...', 'success');
  setTimeout(() => location.reload(), 1500);
}

function showKeyboardShortcuts() {
  showModal('⌨️ Shortcuts', `
    <div style="display:grid;gap:12px;">
      <div class="site-card" style="cursor:default;"><div class="site-info"><div class="site-name">+</div><div class="site-url">Add new manga</div></div></div>
      <div class="site-card" style="cursor:default;"><div class="site-info"><div class="site-name">Ctrl + F</div><div class="site-url">Search library</div></div></div>
      <div class="site-card" style="cursor:default;"><div class="site-info"><div class="site-name">1 / 2 / 3 / 4</div><div class="site-url">Switch tabs</div></div></div>
      <div class="site-card" style="cursor:default;"><div class="site-info"><div class="site-name">Esc</div><div class="site-url">Close modal</div></div></div>
      <div class="site-card" style="cursor:default;"><div class="site-info"><div class="site-name">Delete</div><div class="site-url">Delete selected (in select mode)</div></div></div>
    </div>
  `);
}

// ===================== CONTEXT MENU =====================
function showContext(e, id) {
  e.preventDefault();
  selectedManga = appData.manga.find(m => m.id === id);
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('active');
}

document.addEventListener('click', () => {
  document.getElementById('contextMenu').classList.remove('active');
});

function ctxRead() { if (selectedManga) readManga(selectedManga.id); }
function ctxEdit() { if (selectedManga) editManga(selectedManga.id); }
function ctxUpdate() { if (selectedManga) quickUpdate(selectedManga.id); }
function ctxToggleRead() { if (selectedManga) toggleReadStatus(selectedManga.id); }
function ctxDelete() { if (selectedManga) deleteManga(selectedManga.id); }

// ===================== MODAL SYSTEM =====================
function showModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

// ===================== SELECTION MODE =====================
function toggleSelectionMode() {
  selectionMode = !selectionMode;
  selectedItems.clear();
  renderLibrary();
  if (selectionMode) {
    toast('Select items to bulk delete', 'info');
  }
}

function toggleSelect(id) {
  if (!selectionMode) return;
  if (selectedItems.has(id)) selectedItems.delete(id);
  else selectedItems.add(id);
  renderLibrary();
}

// ===================== NOTIFICATIONS =====================
function showNotifications() {
  const newItems = appData.manga.filter(m => isNewRelease(m));
  showModal('🔔 Notifications', `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:48px;margin-bottom:12px;">🔔</div>
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;">${newItems.length} updates today</div>
      <div style="color:var(--text-dim);font-size:13px;">Release day reminders based on your schedule</div>
    </div>
    ${newItems.length ? `
      <div style="margin-top:16px;">
        ${newItems.map(m => `
          <div class="site-card" style="margin-bottom:8px;" onclick="readManga('${m.id}');closeModal();">
            <div class="site-icon" style="background:linear-gradient(135deg,var(--success),#16a34a);">📖</div>
            <div class="site-info">
              <div class="site-name">${escapeHtml(m.title)}</div>
              <div class="site-url">Chapter ${m.chapter} • ${getSite(m.siteId).name}</div>
            </div>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `);
}

function toggleSearch() {
  if (currentTab !== 'library') {
    switchTab('library');
    setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
  } else {
    document.getElementById('searchInput')?.focus();
  }
}

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '+' && !document.querySelector('.modal-overlay.active')) {
    e.preventDefault();
    if (currentTab === 'sites') showAddSite();
    else showAddManga();
  }
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    toggleSearch();
  }
  if (!isNaN(e.key) && e.key >= '1' && e.key <= '4') {
    const tabs = ['home','library','sites','more'];
    switchTab(tabs[parseInt(e.key)-1]);
  }
});

// ===================== SERVICE WORKER =====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
  `)).catch(() => {});
}

// ===================== INIT =====================
loadData();
if (settings.amoled) document.body.classList.add('amoled');
initPin();
switchTab('home');

// Update badge
const badge = document.getElementById('notifBadge');
const newCount = appData.manga.filter(m => isNewRelease(m)).length;
if (newCount > 0) {
  badge.textContent = newCount;
  badge.style.display = 'flex';
}
</script>
