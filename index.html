
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infinite_Void</title>
<script src="app.js"></script>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="header">
∞ Infinite_Void
</header>

<div id="homePage" class="page">

<div class="card">
<h2>Today's Updates</h2>
<div id="mangaList"></div>
</div>

<button onclick="addManga()">
+ Add Manga
</button>

</div>

<div id="sitesPage" class="page hidden">

<div class="card">

<h2>Sites</h2>

<div id="siteList"></div>

<button onclick="addSite()">
+ Add Site
</button>

</div>

</div>

<div id="settingsPage" class="page hidden">

<div class="card">

<h2>Settings</h2>

<button onclick="clearData()">
Clear Data
</button>

</div>

</div>

<nav class="navbar">

<div onclick="showPage('homePage')">
🏠
</div>

<div onclick="showPage('sitesPage')">
🌐
</div>

<div onclick="showPage('settingsPage')">
⚙️
</div>

</nav>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'service-worker.js'
);

}
</script>

</body>
</html>
