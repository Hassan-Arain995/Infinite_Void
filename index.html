<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Infinite_Void</title>

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="header">

∞ Infinite_Void

</div>

<!-- HOME -->

<div id="homePage"
class="container">

<div class="card">

<h2>
Today's Updates
</h2>

<div id="mangaList">

No manga yet

</div>

</div>

<button onclick="addManga()">

+ Add Manga

</button>

</div>


<!-- LIBRARY -->

<div id="libraryPage"
class="container"
style="display:none">

<div class="card">

<h2>

Library

</h2>

<div id="libraryList">

No manga

</div>

</div>

</div>


<!-- SITES -->

<div id="sitesPage"
class="container"
style="display:none">

<div class="card">

<h2>

Sites

</h2>

<div id="siteList">

</div>

<br>

<button onclick="addSite()">

+ Add Site

</button>

</div>

</div>


<!-- SETTINGS -->

<div id="settingsPage"
class="container"
style="display:none">

<div class="card">

<h2>

Settings

</h2>

<button onclick="
localStorage.clear();
location.reload();
">

Clear Data

</button>

</div>

</div>


<!-- NAV -->

<div class="navbar">

<div
class="navitem"
onclick="showPage('home')">

🏠

</div>

<div
class="navitem"
onclick="showPage('library')">

📚

</div>

<div
class="navitem"
onclick="showPage('sites')">

🌐

</div>

<div
class="navitem"
onclick="showPage('settings')">

⚙️

</div>

</div>

<script src="app.js"></script>

</body>

</html>
